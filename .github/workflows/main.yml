name: Deploy

on:
  push:
    branches:
      - main
jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Create .env.test file
        run: echo "DATABASE_URL=postgresql://root:password@localhost:5433/drive-now-app" >> .env.test

      - name: Install dependecies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Eslint
        run: npm run eslint:check

      - name: Prettier
        run: npm run prettier:check

      - name: Test
        run: npm run test
