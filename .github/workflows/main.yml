name: Deploy

on:
  push:
    branches:
      - main
jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Create .env.test file
        run:
          echo 'DATABASE_URL="postgresql://root:password@localhost:5433/drive-now-app"' >> .env.test
          echo 'JWT_ACCESS_TOKEN_SECRET="secret"' >> .env.test
          echo 'JWT_REFRESH_TOKEN_SECRET="secret2"' >> .env.test

      - name: Install dependecies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Eslint
        run: npm run eslint:check

      - name: Prettier
        run: npm run prettier:check

      - name: Test
        run: |
          export $(cat .env.test | xargs)
          npm run test

  migrate:
    runs-on: ubuntu-latest
    needs: check
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install dependecies
        run: npm install

      - name: Make envfile
        uses: SpicyPizza/create-envfile@v2.0
        with:
          envkey_DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run migrations
        run: npx prisma migrate deploy

  deploy:
    runs-on: ubuntu-latest
    needs: migrate
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          curl "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
